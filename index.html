<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Reader</title>

  <meta name="theme-color" content="#0284c7" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a, #14532d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(34, 197, 94, 0.35);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 15px;
      border-radius: 28px;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.45), 0 14px 35px rgba(34, 197, 94, 0.28);
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 0.95rem;
      margin-bottom: 22px;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #020617;
      border: 2px dashed #22c55e;
      padding: 10px;
      margin-bottom: 18px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      flex: 1;
      border: none;
      outline: none;
      padding: 13px 15px;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
    }

    .start-btn {
      background: #22c55e;
      color: #020617;
    }

    .stop-btn {
      background: #ef4444;
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .result-box {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      word-wrap: break-word;
    }

    .result-box h3 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    #result {
      color: #e5e7eb;
      font-size: 0.95rem;
      min-height: 30px;
    }

    .copy-btn,
    .open-btn {
      width: 100%;
      margin-top: 12px;
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
    }

    .open-btn {
      display: none;
      text-align: center;
      text-decoration: none;
      padding: 13px 15px;
      border-radius: 15px;
      font-weight: bold;
      background: #2563eb;
      color: white;
    }



    .install-btn {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      border: none;
      display: none;
    }

    .status {
      margin-top: 15px;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      .app {
        padding: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="logo"><img src="icons/logo.png" alt="QR scanner logo"></div>
    <h1>QR Code Reader</h1>
    <p class="subtitle">Scan QR codes using your camera</p>

    <div id="reader"></div>

    <div class="buttons">
      <button class="start-btn" onclick="startScanner()">Start Camera</button>
      <button class="stop-btn" onclick="stopScanner()">Stop</button>
    </div>

    <div class="result-box">
      <h3>Scan Result</h3>
      <p id="result">No QR code scanned yet.</p>
      <button class="copy-btn" onclick="copyResult()">Copy Result</button>
      <a id="openLink" class="open-btn" href="#" target="_blank">Open Link</a>
      <button id="installBtn" class="install-btn">Install App</button>
    </div>

    <p class="status" id="status">Camera is not started.</p>
  </div>

  <!-- QR scanner library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    let html5QrCode;
    let lastResult = "";

    const resultText = document.getElementById("result");
    const statusText = document.getElementById("status");
    const openLink = document.getElementById("openLink");

    function isValidUrl(text) {
      try {
        const url = new URL(text);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch (error) {
        return false;
      }
    }

    function showResult(decodedText) {
      lastResult = decodedText;
      resultText.textContent = decodedText;
      statusText.textContent = "QR code scanned successfully.";

      if (isValidUrl(decodedText)) {
        openLink.href = decodedText;
        openLink.style.display = "block";
      } else {
        openLink.style.display = "none";
      }
    }

    function startScanner() {
      if (html5QrCode) {
        statusText.textContent = "Scanner is already running.";
        return;
      }

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: {
          width: 250,
          height: 250
        }
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        function(decodedText) {
          showResult(decodedText);
        },
        function(errorMessage) {
          // This runs many times while scanning, so we keep it quiet.
        }
      ).then(function() {
        statusText.textContent = "Camera started. Point it at a QR code.";
      }).catch(function(error) {
        statusText.textContent = "Camera error: please allow camera permission or use HTTPS/GitHub Pages.";
        html5QrCode = null;
      });
    }

    function stopScanner() {
      if (!html5QrCode) {
        statusText.textContent = "Scanner is not running.";
        return;
      }

      html5QrCode.stop().then(function() {
        html5QrCode.clear();
        html5QrCode = null;
        statusText.textContent = "Camera stopped.";
      }).catch(function(error) {
        statusText.textContent = "Unable to stop scanner.";
      });
    }

    function copyResult() {
      if (!lastResult) {
        statusText.textContent = "Nothing to copy yet.";
        return;
      }

      navigator.clipboard.writeText(lastResult).then(function() {
        statusText.textContent = "Result copied.";
      }).catch(function() {
        statusText.textContent = "Copy failed. You can manually select the result.";
      });
    }


    // PWA install support
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", function(event) {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async function() {
      if (!deferredPrompt) {
        statusText.textContent = "Install option is not ready yet. Open from HTTPS/GitHub Pages and try again.";
        return;
      }

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("service-worker.js").catch(function() {
          // App still works if service worker registration fails.
        });
      });
    }

  </script>

</body>
</html>
